name: Daily Stock Radar

on:
  schedule:
    # 台灣時間 15:00 = UTC 07:00（收盤後，避開繁忙時段）
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # 允許手動觸發

jobs:
  run-radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許寫入 repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Wash Radar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python wash_radar.py

      - name: Run Revenue Radar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python radar.py

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wash_radar.json data/revenue.json
          git diff --staged --quiet || git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M') CST"
          git push
