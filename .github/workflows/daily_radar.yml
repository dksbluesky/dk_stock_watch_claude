name: Daily Stock Radar

on:
  schedule:
    # 台灣時間 15:00 = UTC 07:00
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Wash Radar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python wash_radar.py

      - name: Run Revenue Radar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python radar.py

      - name: Move JSON to data folder
        run: |
          mkdir -p data
          [ -f wash_radar.json ] && mv wash_radar.json data/wash_radar.json || echo "wash_radar.json not found"
          [ -f revenue.json ] && mv revenue.json data/revenue.json || echo "revenue.json not found"
          ls -la data/

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wash_radar.json data/revenue.json
          git status
          git diff --staged --quiet || git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M') CST"
          git push
