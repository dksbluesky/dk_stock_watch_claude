name: Cleanup Workflow Runs

on:
  workflow_run:
    workflows: ["Daily Stock Radar"]
    types: [completed]
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete old workflow runs (keep latest 3)
        uses: actions/github-script@v7
        with:
          script: |
            const targets = [
              { workflow_id: 'daily_radar.yml',  keep: 3 },
              { workflow_id: 'cleanup_runs.yml', keep: 3 },
            ];

            for (const { workflow_id, keep } of targets) {
              const runs = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                { owner: context.repo.owner, repo: context.repo.repo, workflow_id, per_page: 100 }
              );

              runs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              const toDelete = runs.slice(keep);
              console.log(`[${workflow_id}] ${runs.length} runs, deleting ${toDelete.length}.`);

              for (const run of toDelete) {
                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id,
                  });
                } catch (e) {
                  console.log(`  Failed to delete ${run.id}: ${e.message}`);
                }
              }
            }
