name: Cleanup Workflow Runs

on:
  workflow_run:
    workflows: ["Daily Stock Radar"]
    types: [completed]
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete old workflow runs (keep latest 3)
        uses: actions/github-script@v7
        with:
          script: |
            const keep = 3;

            // Fetch ALL runs across all workflows
            const allRuns = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );

            // Group by workflow_id, sort newest first
            const byWorkflow = {};
            for (const run of allRuns) {
              const wid = run.workflow_id;
              if (!byWorkflow[wid]) byWorkflow[wid] = [];
              byWorkflow[wid].push(run);
            }

            let deleted = 0;
            for (const [wid, runs] of Object.entries(byWorkflow)) {
              runs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              const toDelete = runs.slice(keep);
              console.log(`workflow ${wid}: ${runs.length} runs, deleting ${toDelete.length}`);
              for (const run of toDelete) {
                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id,
                  });
                  deleted++;
                } catch (e) {
                  console.log(`  Failed to delete ${run.id}: ${e.message}`);
                }
              }
            }
            console.log(`Done. Deleted ${deleted} run(s) total.`);
